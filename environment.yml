# Conda environment for reproducing the deposited analysis code.
# Create with:  conda env create -f environment.yml
# Then:         conda activate tcc-weathering
#
# Pins reflect the environment under which the shipped database and models were
# validated (NB06 reproduces shap_hierarchy at rtol=1e-9). numpy is held < 2.
name: tcc-weathering
channels:
  - conda-forge
dependencies:
  - python=3.10
  - numpy=1.26.4
  - pandas=2.3.3
  - scipy=1.15.3
  - scikit-learn=1.7.2
  - xgboost=3.2.0
  - optuna=3.5.0
  - matplotlib=3.9.4
  - seaborn=0.13.2
  - statsmodels=0.14.6
  - networkx=3.4.2
  - jupyterlab
# Notes:
#   - The `shap` package is NOT required: TreeSHAP values are computed via xgboost's
#     native `predict(..., pred_contribs=True)`, which sidesteps a shap 0.44.1 /
#     xgboost 2.x serialization incompatibility.
#   - `firthlogist` and `patsy` are intentionally absent (the selection-bias diagnostic
#     that used them is out of scope for this deposit).
